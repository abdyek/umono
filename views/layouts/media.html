<div class="min-h-screen bg-neutral-900 font-sans selection:bg-purple-500/30 text-neutral-200">
  <div class="flex h-screen overflow-hidden">
    <aside class="w-80 bg-neutral-800/40 backdrop-blur-xl border-r border-neutral-700/50 flex flex-col">
      <div class="p-6 border-b border-neutral-700/50 flex items-center justify-between group">
        <h1 class="text-2xl font-bold bg-gradient-to-br from-purple-400 to-indigo-300 bg-clip-text text-transparent tracking-tight">
          Media
        </h1>
        <a
          href="/admin"
          class="group p-2 rounded-xl text-neutral-200 hover:text-neutral-100 hover:bg-neutral-500/10 transition-all duration-300 cursor-pointer"
        >
          <span class="relative h-5 w-5 block">
            <svg xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5 transition-transform duration-500 [.htmx-request_&]:invisible"
              fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
            <span class="absolute inset-0 invisible [.htmx-request_&]:visible">
              {{ template "partials/spinner" . }}
            </span>
          </span>
        </a>
      </div>
      <div class="p-4 border-b border-neutral-700/50 space-y-3">
        <a
          href="/admin/media/new"
          class="w-full inline-flex items-center justify-center gap-2 bg-purple-600 hover:bg-purple-500 text-white text-sm font-medium px-4 py-2.5 rounded-xl transition-all duration-200 shadow-lg shadow-purple-900/20 active:scale-[0.98] cursor-pointer"
          hx-get="/admin/media/new"
          hx-target="body"
          hx-push-url="true"
          hx-swap="outerHTML"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg>
          <span>New media</span>
        </a>
      </div>
      <div class="flex-1 overflow-y-auto p-4 space-y-2">
        {{ range .MediaList }}
        <a
          href="/admin/media/{{ .ID }}"
          class="group flex items-center gap-3 rounded-2xl border px-3 py-3 transition-all duration-200 cursor-pointer {{ if .IsActive }}bg-purple-500/10 border-purple-500/30{{ else }}bg-neutral-900/40 border-neutral-800 hover:border-neutral-700 hover:bg-neutral-800/40{{ end }}"
          hx-get="/admin/media/{{ .ID }}"
          hx-target="body"
          hx-push-url="true"
          hx-swap="outerHTML"
        >
          <div class="h-12 w-12 shrink-0 overflow-hidden rounded-xl border border-neutral-800 bg-neutral-950/50">
            <img src="{{ .URL }}" alt="{{ .Name }}" class="h-full w-full object-cover">
          </div>
          <div class="min-w-0 flex-1">
            <p class="truncate text-sm font-medium text-neutral-200">{{ if .Alias }}{{ .Alias }}{{ else }}{{ .Name }}{{ end }}</p>
            <p class="truncate text-xs text-neutral-500">{{ .ContentType }}</p>
          </div>
        </a>
        {{ else }}
        <div class="rounded-2xl border border-dashed border-neutral-800 bg-neutral-900/40 px-4 py-6 text-sm text-neutral-500">
          No media found yet.
        </div>
        {{ end }}
      </div>
    </aside>
    <main id="media-content" class="flex flex-1 min-h-0 bg-neutral-900">
      {{embed}}
    </main>
  </div>
</div>
