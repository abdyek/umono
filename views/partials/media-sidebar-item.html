<a
  href="/admin/media/{{ .ID }}"
  class="group relative flex items-center gap-3 rounded-2xl border px-3 py-3 transition-all duration-200 cursor-pointer {{ if .IsActive }}bg-purple-500/10 border-purple-500/30{{ else }}bg-neutral-900/40 border-neutral-800 hover:border-neutral-700 hover:bg-neutral-800/40{{ end }}"
  hx-get="/admin/media/{{ .ID }}"
  hx-target="#media-content"
  hx-push-url="/admin/media/{{ .ID }}"
  hx-swap="outerHTML"
>
  <div class="h-12 w-12 shrink-0 overflow-hidden rounded-xl border border-neutral-800 bg-neutral-950/50">
    <img src="{{ .URL }}" alt="{{ .Name }}" class="h-full w-full object-cover">
  </div>
  <div class="min-w-0 flex-1">
    <p class="truncate text-sm font-medium text-neutral-200">{{ if .Alias }}{{ .Alias }}{{ else }}{{ .Name }}{{ end }}</p>
    <p class="truncate text-xs text-neutral-500">{{ .ContentType }}</p>
  </div>
  <span class="hidden [.htmx-request_&]:inline-flex h-5 w-5 text-white ml-auto shrink-0">
    {{ template "partials/spinner" . }}
  </span>
</a>
