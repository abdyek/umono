<div id="settings-general-content" class="flex-1 flex overflow-hidden h-full">
  <div class="flex-1 flex flex-col">
    <header class="px-6 py-4 border-b border-neutral-700/50 bg-neutral-800/20">
      <div class="flex items-center justify-between">
        <h2 class="text-lg font-semibold text-neutral-200">{{ t .I18n "settings.general.title" }}</h2>
      </div>
    </header>
    <form
      id="settings-general-form"
      class="p-6 max-w-xl space-y-6"
      hx-post="/admin/options/language"
      hx-swap="none"
      hx-disabled-elt="#language,#settings-general-save-button"
    >
      <div class="space-y-2">
        <p class="text-sm text-neutral-400">{{ t .I18n "settings.general.description" }}</p>
        <label class="text-sm font-medium text-neutral-300 ml-1" for="language">{{ t .I18n "settings.general.language" }}</label>
        <select
          id="language"
          name="language"
          class="w-full bg-neutral-900/50 border border-neutral-700 text-neutral-200 rounded-xl px-4 py-3 text-sm outline-none focus:border-purple-500/50 focus:ring-4 focus:ring-purple-500/10 transition-all duration-200"
        >
          {{ range .Languages }}
            <option value="{{ .Code }}"{{ if eq $.Language .Code }} selected{{ end }}>{{ .Name }}</option>
          {{ end }}
        </select>
      </div>
      <div>
        <button
          id="settings-general-save-button"
          type="submit"
          class="relative flex items-center gap-2 bg-purple-600 hover:bg-purple-500 text-white text-sm font-medium px-4 py-2 rounded-xl transition-all duration-200 shadow-lg shadow-purple-900/20 active:scale-[0.98] cursor-pointer"
        >
          <span class="flex items-center gap-2 [.htmx-request_&]:invisible">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
            <span>{{ t .I18n "common.save" }}</span>
          </span>
          <span class="absolute inset-0 flex items-center justify-center invisible [.htmx-request_&]:visible text-white">
            <span class="h-4 w-4">
              {{ template "partials/spinner" . }}
            </span>
          </span>
        </button>
      </div>
    </form>
  </div>
</div>
