<div id="media-sidebar" class="flex flex-1 min-h-0 flex-col"{{if and .IsHTMX .IsAlreadyOnMedia}} hx-swap-oob="outerHTML"{{end}}>
  <div class="p-4 border-b border-neutral-700/50 space-y-3">
    <a
      href="/admin/media/new"
      class="group relative w-full inline-flex items-center justify-center gap-2 bg-purple-600 hover:bg-purple-500 text-white text-sm font-medium px-4 py-2.5 rounded-xl transition-all duration-200 shadow-lg shadow-purple-900/20 active:scale-[0.98] cursor-pointer"
      hx-get="/admin/media/new"
      hx-target="#media-content"
      hx-push-url="/admin/media/new"
      hx-swap="outerHTML"
    >
      <span class="flex items-center gap-2 [.htmx-request_&]:invisible">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        <span>New media</span>
      </span>
      <span class="absolute inset-0 flex items-center justify-center invisible [.htmx-request_&]:visible">
        <span class="h-4 w-4">
          {{ template "partials/spinner" . }}
        </span>
      </span>
    </a>
  </div>
  <div class="flex-1 overflow-y-auto p-4 space-y-2">
    {{ range .MediaList }}
      {{ template "partials/media-sidebar-item" . }}
    {{ else }}
    <div class="rounded-2xl border border-dashed border-neutral-800 bg-neutral-900/40 px-4 py-6 text-sm text-neutral-500">
      No media found yet.
    </div>
    {{ end }}
  </div>
</div>
